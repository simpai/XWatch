<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Options Viewer</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>저장 메모를 설정에서 통합 관리</h1>
          <div class="subtitle">조회/검색/삭제 + chrome.storage.sync 남은 공간 확인</div>
        </div>
      </div>
      <div class="badge">Options</div>
    </div>
    <div class="chips">
      <span class="chip">메모 뷰어</span>
      <span class="chip">항목 삭제</span>
      <span class="chip">용량 확인</span>
    </div>
    <section class="panel">
      <h2>설정 페이지</h2>
      <div class="options">
        <div class="quota">
          <div><b>총 할당량</b> 102,400 bytes</div>
          <div><b>사용량</b> 12,410 bytes</div>
          <div><b>남은 공간</b> 89,990 bytes</div>
        </div>
        <div class="table">
          <div class="tr head"><span>User ID</span><span>Handle</span><span>Comment</span><span>Action</span></div>
          <div class="tr"><span>1789...</span><span>@mikiglico</span><span>협업 제안 보냄</span><span>삭제</span></div>
          <div class="tr"><span>5521...</span><span>@drew</span><span>나중에 재확인</span><span>삭제</span></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
