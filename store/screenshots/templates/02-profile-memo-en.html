<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Profile Memo</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>Save memo directly on profile</h1>
          <div class="subtitle">A slim input row placed below UserDescription</div>
        </div>
      </div>
      <div class="badge">Profile</div>
    </div>
    <div class="chips">
      <span class="chip">Instant save</span>
      <span class="chip">Auto-load on revisit</span>
      <span class="chip">Neutral gray UI</span>
    </div>
    <section class="panel">
      <h2>Profile Memo UI</h2>
      <div class="profile-shell">
        <div class="avatar"></div>
        <div class="profile-meta">
          <div class="name">mikiglico</div>
          <div class="handle">@mikiglico</div>
          <div class="inline-box">XMate Memo | Positive about collab last time | Save</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
