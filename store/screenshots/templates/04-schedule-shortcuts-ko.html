<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Schedule Shortcuts</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>예약 전송 시간 단축 버튼</h1>
          <div class="subtitle">복잡한 6개 컨트롤 대신 버튼으로 빠르게 조정</div>
        </div>
      </div>
      <div class="badge">Schedule</div>
    </div>
    <div class="chips">
      <span class="chip">5/10/30/60분</span>
      <span class="chip">+1h / -1h</span>
      <span class="chip">+1d / -1d</span>
    </div>
    <section class="panel">
      <h2>예약하기 모달 보조 패널</h2>
      <div class="schedule">
        <div class="schedule-header">2026년 2월 24일 (화) 오후 11:47에 전송 예정</div>
        <div class="btn-row">
          <span class="btn">5분뒤</span><span class="btn">10분뒤</span><span class="btn">30분뒤</span><span class="btn">1시간뒤</span>
        </div>
        <div class="btn-row">
          <span class="btn">+1시간</span><span class="btn">-1시간</span><span class="btn">+1일</span><span class="btn">-1일</span>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
