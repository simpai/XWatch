<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Schedule Shortcuts</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>Quick scheduled-post time buttons</h1>
          <div class="subtitle">Adjust schedule faster with one-click shortcuts</div>
        </div>
      </div>
      <div class="badge">Schedule</div>
    </div>
    <div class="chips">
      <span class="chip">5/10/30/60 min</span>
      <span class="chip">+1h / -1h</span>
      <span class="chip">+1d / -1d</span>
    </div>
    <section class="panel">
      <h2>Schedule Modal Helper Panel</h2>
      <div class="schedule">
        <div class="schedule-header">Scheduled for Tue, Feb 24, 2026 at 11:47 PM</div>
        <div class="btn-row">
          <span class="btn">In 5m</span><span class="btn">In 10m</span><span class="btn">In 30m</span><span class="btn">In 1h</span>
        </div>
        <div class="btn-row">
          <span class="btn">+1h</span><span class="btn">-1h</span><span class="btn">+1d</span><span class="btn">-1d</span>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
