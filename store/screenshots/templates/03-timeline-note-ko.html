<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Timeline Notes</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>타임라인에서 메모를 즉시 확인</h1>
          <div class="subtitle">게시물 컨텍스트에서 누구인지 바로 떠오르게</div>
        </div>
      </div>
      <div class="badge">Timeline</div>
    </div>
    <div class="chips">
      <span class="chip">줄바꿈 없음</span>
      <span class="chip">이름 옆 인라인</span>
      <span class="chip">회색 배지 스타일</span>
    </div>
    <section class="panel">
      <h2>인라인 메모 표시</h2>
      <div class="timeline">
        <div class="tweet">
          <div class="row"><span class="name">Story</span><span class="note">협업 제안 보냄</span></div>
          <p>이번 주에 공개할 프로젝트를 준비 중입니다.</p>
        </div>
        <div class="tweet">
          <div class="row"><span class="name">Drew Vanilla</span><span class="note">답장 느림, 일주일 뒤 재확인</span></div>
          <p>새로운 스레드를 정리해서 공유합니다.</p>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
