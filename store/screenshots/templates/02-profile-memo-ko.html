<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Profile Memo</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>프로필에서 바로 메모 저장</h1>
          <div class="subtitle">UserDescription 아래에 얇은 입력줄로 자연스럽게 배치</div>
        </div>
      </div>
      <div class="badge">Profile</div>
    </div>
    <div class="chips">
      <span class="chip">즉시 저장</span>
      <span class="chip">재방문시 자동 로드</span>
      <span class="chip">회색톤 UI</span>
    </div>
    <section class="panel">
      <h2>프로필 메모 UI</h2>
      <div class="profile-shell">
        <div class="avatar"></div>
        <div class="profile-meta">
          <div class="name">mikiglico</div>
          <div class="handle">@mikiglico</div>
          <div class="inline-box">XMate 메모 | 지난번 콜라보 긍정적 | 저장</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
