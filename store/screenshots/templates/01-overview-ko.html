<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>XMate Overview</title>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img alt="XMate icon" src="../../../icons/icon-128.png" />
        <div>
          <h1>X에서 기억해야 할 사람, 바로 메모</h1>
          <div class="subtitle">프로필 메모 + 타임라인 인라인 표시 + 다기기 동기화</div>
        </div>
      </div>
      <div class="badge">XMate</div>
    </div>
    <div class="chips">
      <span class="chip">프로필 메모</span>
      <span class="chip">타임라인 표시</span>
      <span class="chip">userId 기반 저장</span>
      <span class="chip">sync 동기화</span>
    </div>
    <section class="panel">
      <h2>한눈에 보는 핵심 기능</h2>
      <div class="grid two">
        <div class="card">
          <h3>프로필 메모</h3>
          <p>프로필 화면에서 바로 작성하고 저장</p>
          <div class="inline-box">XMate 메모 | 나중에 DM 보내기 | 저장</div>
        </div>
        <div class="card">
          <h3>타임라인 표시</h3>
          <p>게시물 사용자 이름 옆에 메모 인라인 노출</p>
          <div class="mock-user">Story <span class="note">나중에 협업 제안</span></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
