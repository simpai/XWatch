<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XMate Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1 id="options-main-title">XMate Settings</h1>
    <section class="card">
      <h2 id="options-storage-title">chrome.storage.sync Usage</h2>
      <div class="row"><span id="options-total-quota-label">Total quota</span><strong id="quota">-</strong></div>
      <div class="row"><span id="options-used-label">Used</span><strong id="used">-</strong></div>
      <div class="row"><span id="options-remaining-label">Remaining</span><strong id="remaining">-</strong></div>
      <div class="row"><span id="options-data-usage-label">XMate data</span><strong id="key-used">-</strong></div>
      <div class="row"><span id="options-user-count-label">Saved users</span><strong id="user-count">-</strong></div>
      <button id="refresh" type="button">Refresh</button>
    </section>
    <section class="card">
      <h2 id="options-viewer-title">Saved Notes Viewer</h2>
      <div class="row">
        <input id="search" type="text" placeholder="Search by handle or comment" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th id="options-col-user-id">User ID</th>
              <th id="options-col-handle">Handle</th>
              <th id="options-col-comment">Comment</th>
              <th id="options-col-updated">Updated</th>
              <th id="options-col-action">Action</th>
            </tr>
          </thead>
          <tbody id="viewer-body"></tbody>
        </table>
      </div>
      <p id="viewer-empty" class="empty">No data to display.</p>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
